<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SecureLore</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #17211b;
        background: #f6f4ef;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100vw - 40px));
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(42px, 8vw, 76px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        max-width: 620px;
        font-size: 19px;
        line-height: 1.55;
        color: #3d4b42;
      }

      a {
        color: #1264a3;
        text-decoration-thickness: 2px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SecureLore</h1>
      <p>
        Slack-native preflight reviews for agents, MCP tools, scopes, and
        Marketplace readiness. The live Slack endpoints are available under
        <a href="/api/health">/api/health</a>.
      </p>
    </main>
  </body>
</html>
